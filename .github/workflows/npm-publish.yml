name: Publish Node.js SDK to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.3) — without the v prefix"
        required: true

jobs:
  publish-nodejs:
    name: Publish Node.js SDK
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Stamp version into package.json
        run: |
          sed -i "s/\${VERSION}/${{ github.event.inputs.version }}/g" sdk/nodejs/package.json

      - name: Install and build
        working-directory: sdk/nodejs
        run: |
          npm install
          npm run build

      - name: Publish to npm
        working-directory: sdk/nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}